<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yanarius & Violet | Story</title>
    <!-- 引用外部 CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<audio id="bgm" loop></audio>

<header>
  <div class="header-content">
    <img class="logo" src="https://raw.githubusercontent.com/LitViolet/yanarius-violet/main/images/yana.v_title.png" alt="Logo">
    <div id="musicBtn">
        <img id="cdImg" src="https://raw.githubusercontent.com/LitViolet/yanarius-violet/main/images/cdbox.png" alt="Music Control">
    </div>
  </div>
</header>

<!-- 第一頁：HOME -->
<section class="panel">
  <div class="home-container">
    <img src="https://raw.githubusercontent.com/LitViolet/yanarius-violet/main/images/couple.png" class="home-img" alt="Couple">
    
    <!-- 對話框文本區 -->
    <div class="home-dialog">
      <div class="dialog-text">
        莉特 × 亞納<br>
        「在規則之外，他與她建立了只屬於彼此的定義。」
      </div>
    </div>
  </div>
</section>

<!-- 第二頁：CHARACTER -->
<section class="panel" id="charSection">
  <div class="char-container">
    <div class="main-bg-wrapper" id="mainBg">
      <img src="https://raw.githubusercontent.com/LitViolet/yanarius-violet/main/images/into.png" class="front-img" alt="Characters">
    </div>

    <div class="info-box left-box" id="infoLeft">
      <div class="box-content">
        <h2>維爾莉特</h2>
        <div class="details">
          <p><span>姓名</span><span>Violet</span></p>
          <p><span>性別</span><span>女</span></p>
          <p><span>種族</span><span>人族</span></p>
          <p><span>身高</span><span>168cm</span></p>
          <p><span>職業</span><span>珠寶鍛造</span></p>
        </div>
      </div>
    </div>

    <div class="info-box right-box" id="infoRight">
      <div class="box-content">
        <h2>亞納里斯</h2>
        <div class="details">
          <p><span>姓名</span><span>Yanarius</span></p>
          <p><span>性別</span><span>男</span></p>
          <p><span>種族</span><span>犬族狐狸支</span></p>
          <p><span>身高</span><span>185cm</span></p>
          <p><span>職業</span><span>商人</span></p>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="panel"><h1>未完待續</h1></section>

<button id="toTop"><img src="https://raw.githubusercontent.com/LitViolet/vworld/main/images/top.png" alt="To Top"></button>

<!-- 引用外部 JS -->
<script src="script.js"></script>
</body>
</html>
